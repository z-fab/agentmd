site_name: Agent.md
site_description: Markdown-first runtime for AI agents
site_url: https://z-fab.github.io/agentmd
repo_url: https://github.com/z-fab/agentmd
repo_name: agentmd
edit_uri: edit/master/docs/

theme:
  name: material
  logo: assets/agentmd_icon.png
  favicon: assets/agentmd_icon.png
  palette:
    # Light mode
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    # Dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.instant.prefetch
    - navigation.instant.progress
    - navigation.tracking
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.path
    - navigation.indexes
    - navigation.top
    - navigation.footer
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - toc.follow

plugins:
  - search:
      separator: '[\s\u200b\-_,:!=\[\]()"`/]+|\.(?!\d)|&[lg]t;|(?!\b)(?=[A-Z][a-z])'

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
      combine_header_slug: true
      slugify: !!python/object/apply:pymdownx.slugs.slugify
        kwds:
          case: lower
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.tasklist:
      custom_checkbox: true
  - admonition
  - pymdownx.details
  - tables
  - attr_list
  - md_in_html
  - def_list
  - footnotes
  - pymdownx.critic
  - pymdownx.caret
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.tilde
  - abbr

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/z-fab/agentmd
  version:
    provider: mike

extra_css:
  - stylesheets/extra.css

copyright: Copyright &copy; 2024 Agent.md

nav:
  - Home: index.md
  - Quick Start: quick-start.md
  - Agent Configuration: agent-configuration.md
  - CLI Reference: cli-reference.md
  - Paths & Security: paths-and-security.md
  - Path Model: path-model.md
  - Execution Limits: limits.md
  - Providers: providers.md
  - Triggers: triggers.md
  - Memory: memory.md
  - Skills: skills.md
  - Tools:
      - tools/index.md
      - Built-in Tools: tools/built-in-tools.md
      - Custom Tools: tools/custom-tools.md
      - Agent Delegation: tools/run-agent.md
      - MCP Integration: tools/mcp-integration.md
  - Examples: examples.md
  - Guides:
      - guides/index.md
      - Debugging: guides/debugging.md
      - Security Best Practices: guides/security-best-practices.md
      - Performance: guides/performance.md
      - Multi-Environment: guides/multi-environment.md
      - Versioning & GitOps: guides/versioning-gitops.md
  - REST API: api.md
  - Migration v0.9: migration-0.9.md
  - Migration v0.8: migration-0.8.md
  - Architecture: architecture.md
  - Roadmap: roadmap.md
